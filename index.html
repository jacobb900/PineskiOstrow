<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa Ostrowa Wielkopolskiego</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Interaktywna Mapa Ostrowa Wielkopolskiego</h1>
<div id="custom-modal" class="modal">
  <div class="modal-content">
    <h3>Dodaj nazwę pineski</h3>
    <input type="text" id="pin-name" placeholder="Np. Moja ulubiona lodziarnia">
    <div class="modal-buttons">
      <button id="save-pin">Zapisz</button>
      <button id="cancel-pin">Anuluj</button>
    </div>
  </div>
</div>
<p>Kliknij w dowolnym miejscu na mapie, aby dodać pineskę!</p>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="script.js"></script>

</body>
</html>
